name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-unit-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run lint + typecheck + unit/integration tests
        run: bun run ci

  e2e-test:
    runs-on: ubuntu-latest
    needs: lint-and-unit-integration
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run full E2E suite (core + extended)
        run: bun run test:e2e

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-unit-integration
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cleanstream-api .

      - name: Start container
        run: |
          docker run -d --name api -p 3000:3000 -e API_KEY=test-api-key -e AUDIT_STORE_FILE=/tmp/audit-store.json cleanstream-api
          sleep 5

      - name: Test Docker container
        run: |
          curl -f http://localhost:3000/health
          status=$(curl -sS -o /tmp/ingest-response.json -w "%{http_code}" -X POST http://localhost:3000/ingest \
            -H "Authorization: Bearer test-api-key" \
            -H "Content-Type: application/json" \
            -d '[{"name":"Test","email":"test@example.com"}]')
          test "$status" = "200" || (cat /tmp/ingest-response.json && exit 1)

      - name: Stop container
        run: docker stop api && docker rm api
